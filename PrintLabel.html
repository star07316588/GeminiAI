<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINT BARCODE LABEL</title>

    <link href="/Content/css/mdi/materialdesignicons.min.css" rel="stylesheet">
    <link href="/Content/css/vuetify/vuetify.min.css" rel="stylesheet">
    <link href="/Content/css/slimselect.css" rel="stylesheet">
    <link href="/Content/css/site.css?v=260522" rel="stylesheet">

    <style>
        .msc-panel, .mab-bar {
            margin-bottom: 10px;
        }

        /* 表單外框與標題設計 */
        .form-panel {
            background: var(--bg-surface, #ffffff);
            border: 1px solid var(--border, #d1d5db);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .form-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--accent, #1565C0);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }

        /* 網格排版 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .col-span-2 {
            grid-column: span 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

            .form-group label {
                font-size: 13px;
                font-weight: 600;
                color: var(--text-main, #333);
            }

        .form-control {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fff;
            height: 32px;
        }

            .form-control:focus {
                border-color: var(--accent, #1565C0);
            }

            .form-control:disabled {
                background-color: #f5f5f5;
                cursor: not-allowed;
                color: #888;
            }

        /* Radio Button 群組樣式 */
        .radio-group {
            display: flex;
            align-items: center;
            gap: 16px;
            height: 32px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }

            fieldset:disabled .form-title {
                color: #999;
            }
    </style>
</head>
<body>
    <div id="app" class="page-layout" data-app>

        <mes-toolbar title="Print BarCode Label"></mes-toolbar>

        <div class="page-body">

            <mes-action-bar :buttons="actionButtons"
                            :auto-add-close="true"
                            @action="onAction"></mes-action-bar>

            <!-- 基礎列印條件區塊 -->
            <div class="form-panel">
                <div class="form-grid">

                    <div class="form-group">
                        <label>Stage</label>
                        <select class="form-control" v-model="form.stage" @change="onStageOrFormatChange">
                            <option value="">-- Select Stage --</option>
                            <option v-for="opt in options.stages" :key="opt" :value="opt">{{ opt }}</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Label Format</label>
                        <select class="form-control" v-model="form.labelFormat" @change="onStageOrFormatChange">
                            <option value="">-- Select Format --</option>
                            <option v-for="opt in options.labelFormats" :key="opt" :value="opt">{{ opt }}</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Label Data (Lot/Wafer)</label>
                        <input type="text" class="form-control" v-model="form.labelData" placeholder="輸入 Lot ID 或 Data">
                    </div>

                    <div class="form-group col-span-2">
                        <label>Print Mode</label>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" v-model="form.printMode" value="Normal" @change="onPrintModeChange"> Normal
                            </label>
                            <label class="radio-item">
                                <input type="radio" v-model="form.printMode" value="Reprint" @change="onPrintModeChange"> Reprint
                            </label>
                            <label class="radio-item">
                                <input type="radio" v-model="form.printMode" value="Modify" @change="onPrintModeChange"> Modify
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Printer Server</label>
                        <select class="form-control" v-model="form.printerServer">
                            <option value="">-- Select Server --</option>
                            <option v-for="opt in options.printerServers" :key="opt" :value="opt">{{ opt }}</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Box Qty</label>
                        <input type="number" class="form-control" v-model.number="form.boxQty" min="1" :disabled="!isBoxQtyEnabled">
                    </div>

                    <div class="form-group">
                        <label>Print Qty (列印份數)</label>
                        <input type="number" class="form-control" v-model.number="form.printQty" min="1" max="99">
                    </div>
                </div>
            </div>

            <!-- Reprint 補印專用區塊 -->
            <div class="form-panel" v-show="form.printMode === 'Reprint'">
                <div class="form-title">
                    <i class="mdi mdi-refresh"></i> Reprint Type
                </div>
                <div class="form-grid" style="grid-template-columns: auto 1fr;">
                    <div class="form-group">
                        <div class="radio-group" style="flex-direction: column; align-items: flex-start; gap: 8px; height: auto;">
                            <label class="radio-item">
                                <input type="radio" v-model="form.reprintType" value="LastLabel"> Print Last Label
                            </label>
                            <label class="radio-item">
                                <input type="radio" v-model="form.reprintType" value="SearchData"> Search by Data (EqID/Box)
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Search Data :</label>
                        <input type="text" class="form-control" v-model="form.searchData" :disabled="form.reprintType !== 'SearchData'">
                    </div>
                </div>
            </div>

            <!-- LPI (Label Pack Info) 專用區塊 -->
            <div class="form-panel" v-show="isLabelPackEnabled">
                <div class="form-title">
                    <i class="mdi mdi-package-variant"></i> Label Pack Info.
                </div>
                
                <div class="form-group" style="margin-bottom: 12px;">
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" v-model="form.lpiMode" value="Auto" @change="onLpiModeChange"> Auto
                        </label>
                        <label class="radio-item">
                            <input type="radio" v-model="form.lpiMode" value="Manual" @change="onLpiModeChange"> Manual
                        </label>
                    </div>
                </div>

                <fieldset :disabled="form.lpiMode === 'Auto'">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Label Spec NO.</label>
                            <select class="form-control" v-model="form.lpiLabelSpecNo" @change="onLpiLabelSpecChange">
                                <option value="">-- Select Label Spec --</option>
                                <option v-for="opt in options.lpiLabelSpecs" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Carrier Type</label>
                            <select class="form-control" v-model="form.carrierType" @change="onCarrierTypeChange" :disabled="!form.lpiLabelSpecNo">
                                <option value="">-- Select Carrier Type --</option>
                                <option v-for="opt in options.carrierTypes" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Boxing Spec NO.</label>
                            <select class="form-control" v-model="form.boxingSpecNo" @change="onBoxingSpecChange" :disabled="!form.carrierType">
                                <option value="">-- Select Boxing Spec --</option>
                                <option v-for="opt in options.boxingSpecs" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Brand</label>
                            <select class="form-control" v-model="form.brand" @change="onBrandChange" :disabled="!form.boxingSpecNo">
                                <option value="">-- Select Brand --</option>
                                <option v-for="opt in options.brands" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Pin Count</label>
                            <select class="form-control" v-model="form.pinCount" @change="onPinCountChange" :disabled="!form.brand">
                                <option value="">-- Select Pin Count --</option>
                                <option v-for="opt in options.pinCounts" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Package Code</label>
                            <select class="form-control" v-model="form.packageCode" :disabled="!form.pinCount">
                                <option value="">-- Select Package Code --</option>
                                <option v-for="opt in options.packageCodes" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                    </div>
                </fieldset>
            </div>

        </div><mes-statusbar :msg="statusMsg" :msg-type="statusMsgType"></mes-statusbar>

    </div>
    <script src="/Scripts/vue.min.js"></script>
    <script src="/Scripts/vuetify.min.js"></script>
    <script src="/Scripts/slimselect.js"></script>
    <script src="/Scripts/mes-util.js?v=260522"></script>
    <script src="/Scripts/mes-action-bar.js"></script>

    <script>
        Vue.use(VMessageBox);

        var vapp = new Vue({
            el: '#app',
            data() {
                return {
                    form: {
                        stage: '',
                        labelFormat: '',
                        labelData: '',
                        printMode: 'Normal',
                        printerServer: '',
                        boxQty: 1,
                        printQty: 1,

                        reprintType: 'LastLabel',
                        searchData: '',
                        
                        lpiMode: 'Auto', // Auto 或 Manual
                        lpiLabelSpecNo: '',
                        carrierType: '',
                        boxingSpecNo: '',
                        brand: '',
                        pinCount: '',
                        packageCode: ''
                    },
                    options: {
                        stages: [],
                        labelFormats: [],
                        printerServers: [],
                        
                        lpiLabelSpecs: [],
                        carrierTypes: [],
                        boxingSpecs: [],
                        brands: [],
                        pinCounts: [],
                        packageCodes: []
                    },
                    statusMsg: 'READY',
                    statusMsgType: ''
                };
            },

            computed: {
                actionButtons() {
                    return [
                        { action: 'print', label: 'Print', icon: 'mdi-printer', color: 'primary' },
                        { action: 'clear', label: 'Clear', icon: 'mdi-eraser' }
                    ];
                },
                // 只有選擇 LPI 特定標籤時，才顯示 LPI 區塊
                isLabelPackEnabled() {
                    return this.form.labelFormat === 'FT_Label_PACK_INFO';
                },
                // 部分標籤預設隱藏或禁用 BoxQty，這裡做簡單防呆控制
                isBoxQtyEnabled() {
                    const singleLabels = [
                        "FT_SMALL_LABEL", "CP_SMALL_LABEL", "WS_SMALL_LABEL", "CP_VIRTUAL_LOT_LABEL", 
                        "CP_VIRTUAL_MERGE", "WS_SUMMARY", "WS_TO_SFG", "WS_DGRADE_SUMMARY", 
                        "FT_LOT_INFO", "FT_Label_PACK_INFO", "WS_MULTILOT_TO_SFG", "WSMCD_TO_SFG",
                        "FT_TR_LABEL", "FT_BOX_COUNTING", "FT_BIN_CARD_LABEL", "WS_ENG_LOC_LABEL"
                    ];
                    return !singleLabels.includes(this.form.labelFormat);
                }
            },

            mounted() {
                this.loadInitData();
            },

            methods: {
                async loadInitData() {
                    try {
                        const response = await mesfetch("/api/print/print-label/init", {});
                        if (response.Success && response.Data) {
                            this.options.stages = response.Data.Stages || [];
                            this.options.labelFormats = response.Data.LabelFormats || [];
                            // VB6 預設會先帶出全部的 Printer Server
                            this.options.printerServers = response.Data.PrinterServers || [];
                        }
                    } catch (error) { console.error(error); }
                },

                /* ── 動態連動 Printer Server ── */
                async onStageOrFormatChange() {
                    this.form.printerServer = '';
                    if (!this.form.stage || !this.form.labelFormat) return;

                    try {
                        const response = await mesfetch("/api/print/print-label/mapped-servers", {
                            Stage: this.form.stage,
                            LabelFormat: this.form.labelFormat
                        });
                        if (response.Success) {
                            this.options.printerServers = response.Data;
                        }
                    } catch (error) { console.error(error); }

                    // 若選擇了 LPI 標籤，順便預載 LPI 的第一層
                    if (this.isLabelPackEnabled && this.options.lpiLabelSpecs.length === 0) {
                        this.loadLpiLabelSpecs();
                    }
                },

                onPrintModeChange() {
                    if (this.form.printMode !== 'Reprint') {
                        this.form.searchData = '';
                    }
                },

                /* ── LPI 六層下拉連動邏輯 ── */
                onLpiModeChange() {
                    if (this.form.lpiMode === 'Auto') {
                        this.clearLpiDropdowns(0);
                    } else if (this.options.lpiLabelSpecs.length === 0) {
                        this.loadLpiLabelSpecs();
                    }
                },

                async loadLpiLabelSpecs() {
                    try {
                        const response = await mesfetch("/api/print/print-label/lpi-label-specs", {});
                        if (response.Success) this.options.lpiLabelSpecs = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onLpiLabelSpecChange() {
                    this.clearLpiDropdowns(1);
                    if (!this.form.lpiLabelSpecNo) return;
                    try {
                        const response = await mesfetch("/api/print/print-label/lpi-carrier-types", { 
                            LabelSpecNo: this.form.lpiLabelSpecNo 
                        });
                        if (response.Success) this.options.carrierTypes = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onCarrierTypeChange() {
                    this.clearLpiDropdowns(2);
                    if (!this.form.carrierType) return;
                    try {
                        const response = await mesfetch("/api/print/print-label/lpi-boxing-specs", { CarrierType: this.form.carrierType });
                        if (response.Success) this.options.boxingSpecs = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onBoxingSpecChange() {
                    this.clearLpiDropdowns(3);
                    if (!this.form.boxingSpecNo) return;
                    try {
                        const response = await mesfetch("/api/print/print-label/lpi-brands", {
                            CarrierType: this.form.carrierType,
                            BoxingSpecNo: this.form.boxingSpecNo
                        });
                        if (response.Success) this.options.brands = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onBrandChange() {
                    this.clearLpiDropdowns(4);
                    if (!this.form.brand) return;
                    try {
                        const response = await mesfetch("/api/print/print-label/lpi-pin-counts", {
                            CarrierType: this.form.carrierType,
                            BoxingSpecNo: this.form.boxingSpecNo,
                            Brand: this.form.brand
                        });
                        if (response.Success) this.options.pinCounts = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onPinCountChange() {
                    this.clearLpiDropdowns(5);
                    if (!this.form.pinCount) return;
                    try {
                        const response = await mesfetch("/api/print/print-label/package-codes", {
                            CarrierType: this.form.carrierType,
                            BoxingSpecNo: this.form.boxingSpecNo,
                            Brand: this.form.brand,
                            PinCount: this.form.pinCount
                        });
                        if (response.Success) this.options.packageCodes = response.Data;
                    } catch (error) { console.error(error); }
                },

                clearLpiDropdowns(level) {
                    if (level <= 1) { this.form.carrierType = ''; this.options.carrierTypes = []; }
                    if (level <= 2) { this.form.boxingSpecNo = ''; this.options.boxingSpecs = []; }
                    if (level <= 3) { this.form.brand = ''; this.options.brands = []; }
                    if (level <= 4) { this.form.pinCount = ''; this.options.pinCounts = []; }
                    if (level <= 5) { this.form.packageCode = ''; this.options.packageCodes = []; }
                },

                /* ── 執行列印 (支援 InputBox 攔截機制) ── */
                async doPrint() {
                    if (!this.form.printerServer || !this.form.labelFormat) {
                        VMessageBox.alert('請選擇完整的伺服器與標籤格式！');
                        return;
                    }

                    // 判斷傳給後端的 PrintMode (解決 LPI 的 Auto/Manual 與全域 Normal/Reprint 的交錯)
                    let finalPrintMode = this.form.printMode;
                    if (this.form.labelFormat === 'FT_Label_PACK_INFO' && this.form.printMode === 'Normal') {
                        finalPrintMode = this.form.lpiMode; // 傳入 Auto 或 Manual 讓後端識別
                    }

                    const payload = {
                        Stage: this.form.stage,
                        LabelFormat: this.form.labelFormat,
                        LotId: this.form.labelData.trim(),
                        PrintMode: finalPrintMode,
                        PrinterServer: this.form.printerServer,
                        BoxQty: this.form.boxQty,
                        PrintQty: this.form.printQty,
                        ReprintType: this.form.printMode === 'Reprint' ? this.form.reprintType : '',
                        SearchData: this.form.printMode === 'Reprint' ? this.form.searchData : '',
                        
                        // LPI 專屬參數
                        LabelSpecNo: this.form.lpiLabelSpecNo,
                        CarrierType: this.form.carrierType,
                        BoxingSpecNo: this.form.boxingSpecNo,
                        Brand: this.form.brand,
                        PinCount: this.form.pinCount,
                        PackageCode: this.form.packageCode,
                        
                        UserId: window.checkAuth ? window.checkAuth().userName : 'System'
                    };

                    await this.executePrintApi(payload);
                },

                async executePrintApi(payload) {
                    document.body.style.cursor = 'wait';
                    this.setStatus('PRINTING...', 'info');

                    try {
                        const response = await mesfetch("/api/print/print-label/print", payload);

                        if (response.Success) {
                            VMessageBox.alert(response.Message || '標籤列印指令已成功送出！');
                            this.setStatus('PRINT SUCCESS', 'success');
                        } else {
                            // 🚨 攔截 VB6 InputBox 替代方案 (降級標籤要求手動輸入原始批號)
                            if (response.Message && response.Message.includes("REQUIRE_ORIGINAL_LOT")) {
                                VMessageBox.prompt('無母批 merge 資訊，請輸入原始批號：', '補入資訊', {
                                    confirmButtonText: '確定',
                                    cancelButtonText: '取消'
                                }).then(async (result) => {
                                    if (result && result.value) {
                                        payload.OriLotID = result.value.trim();
                                        await this.executePrintApi(payload); // 帶入 OriLotID 重新呼叫
                                    }
                                }).catch(() => {
                                    this.setStatus('已取消列印', '');
                                });
                                return;
                            }

                            VMessageBox.alert(response.Message || '列印失敗');
                            this.setStatus('PRINT FAILED', 'error');
                        }
                    } catch (error) {
                        console.error(error);
                        VMessageBox.alert('列印發生預期外的錯誤').catch(() => { });
                        this.setStatus('PRINT FAILED', 'error');
                    } finally {
                        document.body.style.cursor = 'default';
                    }
                },

                /* ── 清空表單 ── */
                doClear() {
                    this.form.stage = '';
                    this.form.labelFormat = '';
                    this.form.labelData = '';
                    this.form.printMode = 'Normal';
                    this.form.printerServer = '';
                    this.form.boxQty = 1;
                    this.form.printQty = 1;
                    this.form.searchData = '';
                    this.form.lpiMode = 'Auto';
                    this.form.lpiLabelSpecNo = '';
                    this.clearLpiDropdowns(1);
                    this.setStatus('CLEARED', '');
                },

                doClose() {
                    window.location.href = '/Content/F5.html';
                },

                onAction(action) {
                    const map = {
                        print: this.doPrint,
                        clear: this.doClear,
                        close: this.doClose
                    };
                    if (map[action]) map[action].call(this);
                },

                setStatus(msg, type) {
                    this.statusMsg = msg;
                    this.statusMsgType = type || '';
                }
            }
        });
    </script>
</body>
</html>
