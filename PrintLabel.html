<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINT BARCODE LABEL</title>

    <link href="/Content/css/mdi/materialdesignicons.min.css" rel="stylesheet">
    <link href="/Content/css/vuetify/vuetify.min.css" rel="stylesheet">
    <link href="/Content/css/slimselect.css" rel="stylesheet">
    <link href="/Content/css/site.css?v=260522" rel="stylesheet">

    <style>
        .msc-panel, .mab-bar {
            margin-bottom: 10px;
        }

        /* 表單外框與標題設計 */
        .form-panel {
            background: var(--bg-surface, #ffffff);
            border: 1px solid var(--border, #d1d5db);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .form-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--accent, #1565C0);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }

        /* 網格排版 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        
        /* 針對特定欄位調整寬高比例 */
        .col-span-2 { grid-column: span 2; }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main, #333);
        }

        .form-control {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fff;
        }

        .form-control:focus { border-color: var(--accent, #1565C0); }
        .form-control:disabled { background-color: #f5f5f5; cursor: not-allowed; color: #888; }

        /* Radio Button 群組樣式 */
        .radio-group {
            display: flex;
            align-items: center;
            gap: 16px;
            height: 32px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        /* 利用 fieldset 達成整個區塊的 Disable (對應 VB6 的 Frame.Enabled = False) */
        fieldset {
            border: none;
            padding: 0;
            margin: 0;
        }
        fieldset:disabled .form-title {
            color: #999;
        }
    </style>
</head>
<body>
    <div id="app" class="page-layout" data-app>

        <mes-toolbar title="Print BarCode Label"></mes-toolbar>

        <div class="page-body">

            <mes-action-bar :buttons="actionButtons"
                            :auto-add-close="true"
                            @action="onAction"></mes-action-bar>

                <div class="form-panel">
                    <div class="form-grid">
                        
                        <div class="form-group">
                            <label>Stage</label>
                            <select class="form-control" v-model="form.stage">
                                <option value="">-- Select Stage --</option>
                                <option v-for="opt in options.stages" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Label Type</label>
                            <select class="form-control" v-model="form.labelType">
                                <option value="">-- Select Label Type --</option>
                                <option v-for="opt in options.labelTypes" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                
                        <div class="form-group">
                            <label>Label Format</label>
                            <select class="form-control" v-model="form.labelFormat">
                                <option value="">-- Select Format --</option>
                                <option v-for="opt in options.labelFormats" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Label Data (Wafer/Lot)</label>
                            <input type="text" class="form-control" v-model="form.labelData" placeholder="輸入 Lot ID 或 Data">
                        </div>
                
                        <div class="form-group col-span-2">
                            <label>Print Mode</label>
                            <div class="radio-group">
                                <label class="radio-item">
                                    <input type="radio" v-model="form.printMode" value="Normal" @change="onPrintModeChange"> Normal
                                </label>
                                <label class="radio-item">
                                    <input type="radio" v-model="form.printMode" value="Reprint" @change="onPrintModeChange"> Reprint
                                </label>
                                <label class="radio-item">
                                    <input type="radio" v-model="form.printMode" value="Modify" @change="onPrintModeChange"> Modify
                                </label>
                            </div>
                        </div>
                
                        <div class="form-group">
                            <label>Printer Server</label>
                            <select class="form-control" v-model="form.printerServer" @change="onPrinterServerChange">
                                <option value="">-- Select Server --</option>
                                <option v-for="opt in options.printerServers" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Printer</label>
                            <select class="form-control" v-model="form.printer" :disabled="!form.printerServer">
                                <option value="">-- Select Printer --</option>
                                <option v-for="opt in options.printers" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                
                        <div class="form-group">
                            <label>Box Qty</label>
                            <input type="number" class="form-control" v-model.number="form.boxQty" min="1">
                        </div>
                        <div class="form-group">
                            <label>Print Qty (列印份數)</label>
                            <input type="number" class="form-control" v-model.number="form.printQty" min="1" max="99">
                        </div>
                
                    </div>
                </div>

            <div class="form-panel" v-show="form.printMode === 'Reprint'">
                <div class="form-title">
                    <i class="mdi mdi-refresh"></i> Reprint Type
                </div>
                <div class="form-grid" style="grid-template-columns: auto 1fr;">
                    <div class="form-group">
                        <div class="radio-group" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                            <label class="radio-item">
                                <input type="radio" v-model="form.reprintType" value="LastLabel"> Print Last Label
                            </label>
                            <label class="radio-item">
                                <input type="radio" v-model="form.reprintType" value="SearchData"> Search by Data (Wafer/Lot)
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Data :</label>
                        <input type="text" class="form-control" v-model="form.searchData" :disabled="form.reprintType !== 'SearchData'">
                    </div>
                </div>
            </div>

            <div class="form-panel">
                <fieldset :disabled="!isLabelPackEnabled">
                    <div class="form-title">
                        <i class="mdi mdi-package-variant"></i> Label Pack Info.
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Carrier Type</label>
                            <select class="form-control" v-model="form.carrierType" @change="onCarrierTypeChange">
                                <option value="">-- Select Carrier Type --</option>
                                <option v-for="opt in options.carrierTypes" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Boxing Spec NO.</label>
                            <select class="form-control" v-model="form.boxingSpecNo" @change="onBoxingSpecChange" :disabled="!form.carrierType">
                                <option value="">-- Select Boxing Spec --</option>
                                <option v-for="opt in options.boxingSpecs" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Brand</label>
                            <select class="form-control" v-model="form.brand" @change="onBrandChange" :disabled="!form.boxingSpecNo">
                                <option value="">-- Select Brand --</option>
                                <option v-for="opt in options.brands" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Pin Count</label>
                            <select class="form-control" v-model="form.pinCount" :disabled="!form.brand">
                                <option value="">-- Select Pin Count --</option>
                                <option v-for="opt in options.pinCounts" :key="opt" :value="opt">{{ opt }}</option>
                            </select>
                        </div>
                    </div>
                </fieldset>
            </div>

        </div><mes-statusbar :msg="statusMsg" :msg-type="statusMsgType"></mes-statusbar>

    </div><script src="/Scripts/vue.min.js"></script>
    <script src="/Scripts/vuetify.min.js"></script>
    <script src="/Scripts/slimselect.js"></script>
    <script src="/Scripts/mes-util.js?v=260522"></script>
    <script src="/Scripts/mes-action-bar.js"></script>

    <script>
        Vue.use(VMessageBox);

        var vapp = new Vue({
            el: '#app',
            data() {
                return {
                    // 表單綁定的值
            form: {
                        stage: '',           // 新增
                        labelType: '',       // 新增
                        labelFormat: '',
                        labelData: '',
                        printMode: 'Normal',
                        printerServer: '',   // 新增
                        printer: '',
                        boxQty: 1,           // 新增
                        printQty: 1,         // 已有的列印份數
                        
                        reprintType: 'LastLabel',
                        searchData: '',
                        carrierType: '',
                        boxingSpecNo: '',
                        brand: '',
                        pinCount: ''
                    },
                    
                    options: {
                        stages: ['StageAY', 'StageFT', 'StageWS'],  // 擴充假資料
                        labelTypes: ['Inner Box', 'Outer Box', 'Wafer'], 
                        labelFormats: ['FT_TRAY', 'FT_ASUS_TRAY', 'TAPE_REEL'], 
                        printerServers: ['SERVER_01', 'SERVER_02'], // 擴充印表機伺服器
                        printers: [], // 改為根據 Printer Server 連動
                        carrierTypes: [],
                        boxingSpecs: [],
                        brands: [],
                        pinCounts: []
                    },

                    statusMsg: 'READY',
                    statusMsgType: ''
                };
            },

            computed: {
                /* 動態變更按鈕 */
                actionButtons() {
                    return [
                        { action: 'print', label: 'Print', icon: 'mdi-printer', color: 'primary' },
                        { action: 'clear', label: 'Clear', icon: 'mdi-eraser' }
                    ];
                },
                /* 判斷 Label Pack Info 區塊是否啟用 (對應 VB6 的 Frame2.Enabled) */
                isLabelPackEnabled() {
                    // 根據您提供的截圖 3，當選擇 Modify 時才會啟用這個區塊
                    return this.form.printMode === 'Modify';
                }
            },

            mounted() {
                // 初始化：撈取需要從資料庫取得的下拉選單
                this.loadInitData();
            },

            methods: {
                async loadInitData() {
                    // 這裡呼叫先前寫好的 CarrierTypes API
                    try {
                        const response = await mesfetch("/api/print/print-label/carrier-types", {});
                        if (response.Success) {
                            this.options.carrierTypes = response.Data;
                        }
                    } catch (error) {
                        console.error(error);
                    }
                    
                    // TODO: 您可能還需要寫一支 API 來取得 LabelFormats 和 Printers 的清單
                    // const resInit = await mesfetch("/api/print/print-label/init", {});
                },

                /* ── Print Mode 切換事件 ── */
                onPrintModeChange() {
                    // 切換模式時，通常會清空不相關的輸入
                    if (this.form.printMode !== 'Reprint') {
                        this.form.searchData = '';
                    }
                    if (this.form.printMode !== 'Modify') {
                        // 如果切回 Normal，可以選擇保留或清空 Label Pack 條件
                        // 依照 VB 習慣通常會清空
                        this.form.carrierType = '';
                        this.onCarrierTypeChange(); 
                    }
                },

                /* ── 連動選單邏輯 (維持與上一版相同) ── */
                async onCarrierTypeChange() {
                    this.form.boxingSpecNo = '';
                    this.form.brand = '';
                    this.form.pinCount = '';
                    this.options.boxingSpecs = [];
                    this.options.brands = [];
                    this.options.pinCounts = [];

                    if (!this.form.carrierType) return;

                    try {
                        const response = await mesfetch("/api/print/print-label/boxing-specs", { CarrierType: this.form.carrierType });
                        if (response.Success) this.options.boxingSpecs = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onBoxingSpecChange() {
                    this.form.brand = '';
                    this.form.pinCount = '';
                    this.options.brands = [];
                    this.options.pinCounts = [];

                    if (!this.form.boxingSpecNo) return;

                    try {
                        const response = await mesfetch("/api/print/print-label/brands", { 
                            CarrierType: this.form.carrierType,
                            BoxingSpecNo: this.form.boxingSpecNo
                        });
                        if (response.Success) this.options.brands = response.Data;
                    } catch (error) { console.error(error); }
                },

                async onBrandChange() {
                    this.form.pinCount = '';
                    this.options.pinCounts = [];

                    if (!this.form.brand) return;

                    try {
                        const response = await mesfetch("/api/print/print-label/pin-counts", { 
                            CarrierType: this.form.carrierType,
                            BoxingSpecNo: this.form.boxingSpecNo,
                            Brand: this.form.brand
                        });
                        if (response.Success) this.options.pinCounts = response.Data;
                    } catch (error) { console.error(error); }
                },

                /* ── 新增：印表機伺服器連動印表機 ── */
                async onPrinterServerChange() {
                    this.form.printer = '';
                    this.options.printers = [];
                    if (!this.form.printerServer) return;
            
                    try {
                        // 實務上這裡會呼叫後端 API，例如：
                        // const response = await mesfetch("/api/print/print-label/printers", { Server: this.form.printerServer });
                        // if (response.Success) this.options.printers = response.Data;
                        
                        // 模擬連動效果
                        if (this.form.printerServer === 'SERVER_01') {
                            this.options.printers = ['PRINTER_A1', 'PRINTER_A2'];
                        } else {
                            this.options.printers = ['PRINTER_B1', 'PRINTER_B2'];
                        }
                    } catch (error) {
                        console.error(error);
                    }
                },
                
                /* ── 執行列印 ── */
                async doPrint() {
                    // 更新防呆機制，加入新的必填欄位檢查
                    if (!this.form.printerServer || !this.form.printer || !this.form.labelFormat) {
                        VMessageBox.alert('請選擇完整的伺服器、印表機與標籤格式！');
                        return;
                    }

                    document.body.style.cursor = 'wait';
                    this.setStatus('PRINTING...', 'info');

                    try {
                        // 💡 這裡必須把您畫面上所有用到的參數包裝給後端
                        const payload = {
                            Stage: this.form.stage,
                            LabelType: this.form.labelType,
                            LabelFormat: this.form.labelFormat,
                            LotId: this.form.labelData.trim(),
                            PrintMode: this.form.printMode,
                            PrinterServer: this.form.printerServer,
                            Printer: this.form.printer,
                            BoxQty: this.form.boxQty,
                            PrintQty: this.form.printQty,
                            ReprintType: this.form.printMode === 'Reprint' ? this.form.reprintType : '',
                            SearchData: this.form.printMode === 'Reprint' ? this.form.searchData : '',
                            CarrierType: this.form.carrierType,
                            BoxingSpecNo: this.form.boxingSpecNo,
                            Brand: this.form.brand,
                            PinCount: this.form.pinCount,
                            UserId: window.checkAuth ? window.checkAuth().userName : 'System'
                        };

                        const response = await mesfetch("/api/print/print-label/print", payload);

                        if (response.Success) {
                            VMessageBox.alert(response.Message || '標籤列印指令已成功送出！');
                            this.setStatus('PRINT SUCCESS', 'success');
                        } else {
                            VMessageBox.alert(response.Message || '列印失敗');
                            this.setStatus('PRINT FAILED', 'error');
                        }

                    } catch (error) {
                        console.error(error);
                        VMessageBox.alert('列印發生預期外的錯誤').catch(() => { });
                        this.setStatus('PRINT FAILED', 'error');
                    } finally {
                        document.body.style.cursor = 'default';
                    }
                },

                /* ── 清空表單 ── */
                doClear() {
                    this.form.stage = '';
                    this.form.labelType = '';
                    this.form.printerServer = '';
                    this.form.boxQty = 1;
                    this.form.printQty = 1;
                    this.form.labelFormat = '';
                    this.form.labelData = '';
                    this.form.printMode = 'Normal';
                    this.form.printer = '';
                    this.form.printQty = 1;
                    this.form.searchData = '';
                    this.form.carrierType = '';
                    this.onCarrierTypeChange(); 
                    this.setStatus('CLEARED', '');
                },

                doClose() {
                    window.location.href = '/Content/F5.html';
                },

                onAction(action) {
                    const map = {
                        print: this.doPrint,
                        clear: this.doClear,
                        close: this.doClose
                    };
                    if (map[action]) map[action].call(this);
                },

                setStatus(msg, type) {
                    this.statusMsg = msg;
                    this.statusMsgType = type || '';
                }
            }
        });
    </script>
</body>
</html>
