<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunCard 流程卡列印作業</title>
    <!-- 假設引入 Bootstrap 與 Vue (請依據您的專案環境調整) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-header { background-color: #0d6efd; color: white; font-weight: bold; }
        .table-hover tbody tr:hover { background-color: #f1f3f5; cursor: pointer; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 1050;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="app" class="container-fluid mt-4">
        
        <!-- Loading 遮罩 -->
        <div v-if="isLoading" class="loading-overlay">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h4 class="ms-3 text-primary">資料處理中，請稍候...</h4>
        </div>

        <h2 class="mb-4">RunCard 流程卡列印作業</h2>

        <!-- 1. 條件查詢區 (Query Panel) -->
        <div class="card shadow-sm mb-4">
            <div class="card-header">查詢條件</div>
            <div class="card-body">
                <div class="row g-3 align-items-center">
                    <!-- Type (FT/WS) -->
                    <div class="col-md-2">
                        <label class="form-label">報表類型</label>
                        <select class="form-select" v-model="searchForm.Type">
                            <option value="FT">FT (測試)</option>
                            <option value="WS">WS (晶圓)</option>
                        </select>
                    </div>
                    <!-- Lot ID -->
                    <div class="col-md-3">
                        <label class="form-label">批號 (Lot ID)</label>
                        <input type="text" class="form-control" v-model="searchForm.LotId" placeholder="輸入完整或部分批號 (*)" @keyup.enter="queryLots">
                    </div>
                    <!-- IPN -->
                    <div class="col-md-3">
                        <label class="form-label">料號 (IPN)</label>
                        <input type="text" class="form-control" v-model="searchForm.IPN" placeholder="輸入料號" @keyup.enter="queryLots">
                    </div>
                    <!-- Step -->
                    <div class="col-md-2">
                        <label class="form-label">站點 (Step)</label>
                        <input type="text" class="form-control" v-model="searchForm.Step" placeholder="輸入站點" @keyup.enter="queryLots">
                    </div>
                    <!-- 按鈕區 -->
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100 me-2" @click="queryLots">
                            🔍 查詢
                        </button>
                        <button class="btn btn-outline-secondary w-100" @click="resetForm">
                            清除
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 結果清單區 (Data Grid) -->
        <div class="card shadow-sm" v-if="lotList.length > 0">
            <div class="card-header bg-secondary">
                查詢結果 (共 {{ lotList.length }} 筆)
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>批號 (Lot ID)</th>
                                <th>料號 (IPN)</th>
                                <th>目前站點 (Step)</th>
                                <th>站點描述</th>
                                <th>數量 (Qty)</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(lot, index) in lotList" :key="index">
                                <td><strong>{{ lot.LotId }}</strong></td>
                                <td>{{ lot.IPN }}</td>
                                <td>{{ lot.StepName }}</td>
                                <td>{{ lot.Description }}</td>
                                <td>{{ lot.ComponentQty }}</td>
                                <td class="text-center">
                                    <!-- 報表操作按鈕 -->
                                    <button class="btn btn-success btn-sm" @click="printRunCard(lot)">
                                        🖨️ 列印 / 檢視流程卡
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 無資料提示 -->
        <div class="alert alert-info mt-4" v-else-if="hasSearched && lotList.length === 0">
            查無符合條件的批號，請重新調整查詢條件。
        </div>

    </div>

    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    // 對應後端的 QueryRunCardRequest DTO
                    searchForm: {
                        Type: 'FT',
                        LotId: '',
                        IPN: '',
                        Step: ''
                    },
                    lotList: [],
                    isLoading: false,
                    hasSearched: false
                };
            },
            methods: {
                // 清除表單
                resetForm() {
                    this.searchForm.LotId = '';
                    this.searchForm.IPN = '';
                    this.searchForm.Step = '';
                    this.lotList = [];
                    this.hasSearched = false;
                },

                // 呼叫 API：查詢批號清單
                async queryLots() {
                    this.isLoading = true;
                    this.hasSearched = true;
                    this.lotList = [];
                    
                    try {
                        const response = await axios.post('/api/print/run-card/query', this.searchForm);
                        
                        if (response.data.Success) {
                            this.lotList = response.data.Data;
                        } else {
                            alert('查詢失敗：' + response.data.Message);
                        }
                    } catch (error) {
                        console.error("Query API Error:", error);
                        alert('系統發生異常，請聯絡 IT 人員。');
                    } finally {
                        this.isLoading = false;
                    }
                },

                // 呼叫 API：取得單一流程卡詳細資料並執行列印/匯出
                async printRunCard(lot) {
                    this.isLoading = true;

                    // 對應後端的 PrintRunCardRequest DTO
                    const requestData = {
                        LotId: lot.LotId,
                        Type: this.searchForm.Type
                    };

                    try {
                        const response = await axios.post('/api/print/run-card/detail', requestData);
                        
                        if (response.data.Success) {
                            const runCardData = response.data.Data;
                            console.log("RunCard 報表資料取得成功:", runCardData);

                            // ----------------------------------------------------
                            // 這裡接續「產出報表」的動作：
                            // 方式 A: 將 runCardData 傳遞給前端報表套件 (如 Stimulsoft, JSReport)
                            // 方式 B: 開啟一個新視窗 (Preview HTML) 供使用者瀏覽器列印
                            // 方式 C: 呼叫另一個後端 API 產生 Excel 檔案並下載
                            // ----------------------------------------------------
                            
                            this.renderPrintPreview(runCardData);

                        } else {
                            alert('取得流程卡資料失敗：' + response.data.Message);
                        }
                    } catch (error) {
                        console.error("Detail API Error:", error);
                        alert('取得流程卡資料發生異常！');
                    } finally {
                        this.isLoading = false;
                    }
                },

                // 處理預覽/列印的顯示邏輯 (依專案實際需求客製)
                renderPrintPreview(data) {
                    // 範例：簡單的 Alert 提示，實務上通常會開啟一個 Modal 或新分頁畫出表格
                    alert(`成功載入 ${data.RunCardType} 流程卡資料！\n批號: ${data.LotId}\n共有 ${data.StepHistories.length} 筆履歷，${data.FutureActions.length} 筆未來處置。`);
                    
                    // TODO: 根據專案習慣，實作 Excel 下載或畫面 Render
                }
            }
        });
    </script>
</body>
</html>
